apiVersion: apps/v1
kind: Deployment
metadata:
  name: qfin-twin-worker
  labels:
    app: qfin-twin
    role: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: qfin-twin
      role: worker
  template:
    metadata:
      labels:
        app: qfin-twin
        role: worker
    spec:
      containers:
      - name: worker
        image: charlesmfouapon/qfin-twin:latest
        command: ["./qfin-twin"]
        args: ["--mode", "worker", "--master", "qfin-twin-master:50051"]
        env:
        - name: RUST_LOG
          value: "info"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
